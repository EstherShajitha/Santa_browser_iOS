name: Automated Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  PYTHON_VERSION: '3.11'
  APPIUM_PORT: '4723'
  APPIUM_HOST: '127.0.0.1'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system dependencies
        run: |
          brew install node
          brew install appium
          echo "Installed Appium version:"
          appium --version

      - name: Create virtual environment
        run: |
          python -m venv .venv
          source .venv/bin/activate
          echo "VIRTUAL_ENV=${VIRTUAL_ENV}" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: |
          source .venv/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          echo "Installed packages:"
          pip list

      - name: Start Appium server
        run: |
          source .venv/bin/activate
          appium --port $APPIUM_PORT &
          APPIUM_PID=$!
          echo "APPIUM_PID=${APPIUM_PID}" >> $GITHUB_ENV
          sleep 10
          echo "Appium server started with PID: $APPIUM_PID"
        timeout-minutes: 2

      - name: Wait for Appium server
        run: |
          source .venv/bin/activate
          for i in {1..30}; do
            if curl -s http://$APPIUM_HOST:$APPIUM_PORT/status > /dev/null 2>&1; then
              echo "Appium server is ready"
              exit 0
            fi
            echo "Waiting for Appium server... ($i/30)"
            sleep 2
          done
          echo "Failed to connect to Appium server"
          exit 1
        timeout-minutes: 2

      - name: Create reports directory
        run: |
          mkdir -p reports/screenshots
          mkdir -p reports/logs

      - name: Run tests
        continue-on-error: true
        run: |
          source .venv/bin/activate
          python -m pytest \
            tests/ \
            -v \
            --tb=short \
            --html=reports/report.html \
            --self-contained-html \
            --junit-xml=reports/junit.xml \
            --capture=no \
            -m "not skip"
        timeout-minutes: 30

      - name: Generate test summary
        if: always()
        run: |
          source .venv/bin/activate
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/junit.xml ]; then
            echo "Test results available in reports/junit.xml" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f reports/report.html ]; then
            echo "HTML report generated: reports/report.html" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 For detailed results, see artifacts below" >> $GITHUB_STEP_SUMMARY

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.python-version }}-${{ matrix.os }}
          path: |
            reports/report.html
            reports/junit.xml
          retention-days: 30

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots-${{ matrix.python-version }}-${{ matrix.os }}
          path: reports/screenshots/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.python-version }}-${{ matrix.os }}
          path: reports/logs/
          retention-days: 30
          if-no-files-found: ignore

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action/composite@v2
        with:
          files: reports/junit.xml
          check_name: Test Results (${{ matrix.python-version }})

      - name: Stop Appium server
        if: always()
        run: |
          if [ ! -z "$APPIUM_PID" ]; then
            kill $APPIUM_PID 2>/dev/null || true
            sleep 2
          fi
          pkill -f appium || true

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint pytest

      - name: Lint with flake8
        run: |
          # E501: Line too long (can be ignored for test files)
          # F401: Imported but unused (check but allow for test fixtures)
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Check imports
        continue-on-error: true
        run: |
          python -m pytest --collect-only 2>&1 | head -20

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint

      - name: Run pylint
        continue-on-error: true
        run: |
          pylint config/ pages/ utils/ locators/ --fail-under=5.0 || true
