[pytest]
pythonpath = .
addopts = -v --tb=short --html=reports/report.html --self-contained-html
# if you prefer to clean the directory each run, uncomment the following:
# addopts = -v --tb=short --html=reports/report.html --self-contained-html

testpaths = tests

markers =
    smoke: critical happy path tests
    regression: full regression suite
    ntp: new tab page tests
    api: API-only tests (no device needed)
    privacy: privacy and security features
    ui: UI interaction tests

timeout = 120
timeout_method = thread